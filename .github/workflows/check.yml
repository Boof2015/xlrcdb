name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Classify PR
        id: classify
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .pr-gates
          set -o pipefail
          npm run classify:pr -- ${{ github.event.pull_request.base.sha }} HEAD --github-output "$GITHUB_OUTPUT" --json-output .pr-gates/classification.json 2>&1 | tee .pr-gates/classify.log

      - name: Validate raw incoming submission
        if: github.event_name != 'pull_request' || steps.classify.outputs.should_validate_raw == 'true'
        run: |
          mkdir -p .pr-gates
          set -o pipefail
          { npm run validate && npm run validate:incoming; } 2>&1 | tee .pr-gates/validate-raw.log

      - name: Normalize dry-run
        if: github.event_name == 'pull_request' && steps.classify.outputs.should_normalize_dry_run == 'true'
        run: |
          mkdir -p .pr-gates
          set -o pipefail
          npm run normalize:dry-run 2>&1 | tee .pr-gates/normalize-dry-run.log

      - name: Check repository
        run: |
          mkdir -p .pr-gates
          set -o pipefail
          npm run check 2>&1 | tee .pr-gates/check.log

      - name: Write PR gate report
        if: always() && github.event_name == 'pull_request'
        run: npm run write:pr-report -- .pr-gates/report.md .pr-gates

      - name: Upload PR gate report
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-report
          path: .pr-gates/report.md
