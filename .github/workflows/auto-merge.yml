name: Auto-merge

# A green Check means the PR is a clean, valid data submission (classify gates
# scope and validate gates content). Merge it; the Reconcile workflow then
# normalizes and regenerates the index on main. Runs as workflow_run so it has
# upstream write permissions even for pull requests opened from forks.
#
# The only gate is a content-neutral per-author daily merge cap (spam throttle,
# not content curation). Maintainers are exempt. Tune via the DAILY_MERGE_CAP
# repository variable (default 30).
on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: auto-merge-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  merge:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      DAILY_MERGE_CAP: ${{ vars.DAILY_MERGE_CAP }}
    steps:
      - name: Merge clean data PR
        uses: actions/github-script@v7
        with:
          # GITHUB_TOKEN 403s merging fork PRs that edit existing files. Use a PAT/App
          # token (XLRCDB_BOT_TOKEN) when set; fall back to GITHUB_TOKEN, which still
          # handles new-track submissions, until the secret is added.
          github-token: ${{ secrets.XLRCDB_BOT_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run;
            const cap = Number(process.env.DAILY_MERGE_CAP) || 30;

            // Resolve the PR this Check run belongs to. For fork PRs,
            // workflow_run.pull_requests is empty and the associated-commit lookup
            // misses the fork's head commit, so fall back to matching an open PR by
            // head SHA (works for same-repo and fork PRs alike).
            let pullNumber = run.pull_requests?.find((pull) => pull.number)?.number;
            if (!pullNumber) {
              const open = await github.paginate(github.rest.pulls.list, { owner, repo, state: "open", per_page: 100 });
              pullNumber = open.find((pull) => pull.head.sha === run.head_sha)?.number;
            }
            if (!pullNumber) {
              core.info(`No pull request found for Check run ${run.id}.`);
              return;
            }

            const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number: pullNumber });
            if (pull.state !== "open") { core.info(`PR #${pullNumber} is ${pull.state}.`); return; }
            if (pull.draft) { core.info(`PR #${pullNumber} is a draft.`); return; }
            // Only merge the exact commit that passed Check.
            if (pull.head.sha !== run.head_sha) {
              core.info(`PR #${pullNumber} moved from ${run.head_sha} to ${pull.head.sha}; waiting for the latest Check.`);
              return;
            }

            // Per-author daily cap. Maintainers (owner / member / collaborator) are exempt.
            const trusted = ["OWNER", "MEMBER", "COLLABORATOR"].includes(pull.author_association);
            if (!trusted) {
              const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
              const author = pull.user.login;
              const search = await github.rest.search.issuesAndPullRequests({
                q: `repo:${owner}/${repo} is:pr is:merged author:${author} merged:>=${since}`,
                per_page: 1
              });
              if (search.data.total_count >= cap) {
                core.info(`PR #${pullNumber}: author ${author} hit the daily cap (${search.data.total_count}/${cap}); leaving for manual review.`);
                await notifyCap(pullNumber, author, cap);
                return;
              }
            }

            try {
              await github.rest.pulls.merge({ owner, repo, pull_number: pullNumber, merge_method: "squash" });
              core.info(`Merged PR #${pullNumber}.`);
            } catch (error) {
              core.warning(`Could not merge PR #${pullNumber}: ${error.message}`);
              return;
            }

            // A GITHUB_TOKEN merge does not trigger Reconcile's push event (Actions
            // anti-recursion), so kick it explicitly. workflow_dispatch is exempt
            // from that limitation; the cron is still there as a backstop.
            try {
              await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: "reconcile.yml", ref: "main" });
              core.info("Dispatched Reconcile.");
            } catch (error) {
              core.warning(`Could not dispatch Reconcile (cron will catch it): ${error.message}`);
            }

            // Leave one comment (and no duplicates) when a PR is held by the cap.
            async function notifyCap(number, author, dailyCap) {
              const marker = "<!-- xlrcdb-rate-limit -->";
              const existing = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: number, per_page: 100 });
              if (existing.some((comment) => comment.body?.includes(marker))) return;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body: `${marker}\nThanks @${author}! You've reached the automatic daily submission limit (${dailyCap}). This PR is valid and will be merged by a maintainer, or it will auto-merge once your recent submissions roll past 24 hours. This is a spam throttle, not a review of the lyrics.`
              });
            }
