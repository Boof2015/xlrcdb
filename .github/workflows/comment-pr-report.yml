name: Comment PR Report

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Download PR gate report
        id: download-report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pr-gate-report
          path: pr-gate-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- xlrcdb-pr-gate-report -->";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run;
            const payloadPull = run.pull_requests?.find((pull) => pull.number);
            let issue_number = payloadPull?.number;

            if (!issue_number) {
              const associatedPulls = await github.paginate(
                github.rest.repos.listPullRequestsAssociatedWithCommit,
                {
                  owner,
                  repo,
                  commit_sha: run.head_sha,
                  per_page: 100
                }
              );
              const associatedPull = associatedPulls.find((pull) => pull.state === "open") ?? associatedPulls[0];
              issue_number = associatedPull?.number;
            }

            if (!issue_number) {
              core.warning(`No pull request was found for Check run ${run.id} at ${run.head_sha}.`);
              return;
            }

            const conclusion = context.payload.workflow_run.conclusion;
            const reportPath = "pr-gate-report/report.md";

            let body = "";
            if (fs.existsSync(reportPath)) {
              body = fs.readFileSync(reportPath, "utf8");
            }

            if (!body.trim()) {
              body = [
                marker,
                "## XLRCDB PR Gate Report",
                "",
                `The Check workflow finished with \`${conclusion}\`, but no detailed report artifact was available.`,
                "",
                "Open the workflow logs for details."
              ].join("\n");
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) => (
              comment.user?.type === "Bot" &&
              comment.body?.includes(marker)
            ));

            if (conclusion === "success") {
              if (!existing) {
                return;
              }

              body = [
                marker,
                "## XLRCDB PR Gate Report",
                "",
                "The latest Check workflow passed."
              ].join("\n");
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
