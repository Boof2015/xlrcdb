name: Normalize Incoming

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Writable branch name to normalize
        required: true
        type: string
      base_ref:
        description: Base branch to compare against
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: normalize-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  normalize:
    runs-on: ubuntu-latest

    steps:
      - name: Guard target branch
        env:
          TARGET_REF: ${{ github.event.inputs.ref }}
          BASE_REF: ${{ github.event.inputs.base_ref }}
        run: |
          if [ "$TARGET_REF" = "$BASE_REF" ] || [ "$TARGET_REF" = "refs/heads/$BASE_REF" ]; then
            echo "Refusing to normalize the base branch directly."
            exit 1
          fi

      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Fetch base branch
        env:
          BASE_REF: ${{ github.event.inputs.base_ref }}
        run: git fetch origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Classify target branch
        id: classify
        env:
          BASE_REF: ${{ github.event.inputs.base_ref }}
        run: |
          mkdir -p "$RUNNER_TEMP/pr-gates"
          set -o pipefail
          npm run classify:pr -- "origin/$BASE_REF" HEAD --github-output "$GITHUB_OUTPUT" --json-output "$RUNNER_TEMP/pr-gates/classification.json" 2>&1 | tee "$RUNNER_TEMP/pr-gates/classify.log"

      - name: Require incoming data submission
        if: steps.classify.outputs.kind != 'data-submission'
        run: |
          echo "Normalize Incoming only runs for raw incoming/*.xlrc submission branches."
          echo "Current classification: ${{ steps.classify.outputs.kind }}"
          exit 1

      - name: Validate raw incoming submission
        run: npm run validate && npm run validate:incoming

      - name: Normalize dry-run
        run: npm run normalize:dry-run

      - name: Normalize incoming files
        run: npm run normalize

      - name: Run tests
        run: npm test

      - name: Validate normalized source data
        run: npm run validate

      - name: Commit normalization changes
        id: commit-normalization
        run: |
          if git diff --quiet; then
            echo "No normalization changes to commit."
            echo "commit_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Normalize incoming XLRC files"
          echo "commit_created=true" >> "$GITHUB_OUTPUT"

      - name: Verify normalized commit scope
        if: steps.commit-normalization.outputs.commit_created == 'true'
        env:
          BASE_REF: ${{ github.event.inputs.base_ref }}
        run: npm run classify:pr -- "origin/$BASE_REF" HEAD

      - name: Check committed normalized state
        run: npm run check

      - name: Push normalization changes
        if: steps.commit-normalization.outputs.commit_created == 'true'
        env:
          TARGET_REF: ${{ github.event.inputs.ref }}
        run: git push origin "HEAD:$TARGET_REF"
