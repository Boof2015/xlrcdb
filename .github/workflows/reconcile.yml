name: Reconcile

# Single serialized job that owns the index. It normalizes any incoming/*.xlrc
# (assigns IDs, moves them under tracks/, auto-creates artists) and regenerates
# index/ from the canonical data, then commits to main. Because the index is
# only ever generated here (never in PRs), submissions can't conflict on it and
# fork PRs work normally (nothing is pushed to a contributor's fork).
on:
  push:
    branches:
      - main
    paths:
      - "incoming/**"
      - "artists/**"
      - "tracks/**"
  schedule:
    # Backstop: catches anything an on-merge run missed (~ every 15 minutes).
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# Never run two reconciles at once: each operates on the latest main and the
# commits stay linear, so there are no index merge conflicts.
concurrency:
  group: reconcile-main
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # normalizeIncoming validates the repo, processes incoming, and regenerates
      # the index in one pass; it exits non-zero on invalid data (no commit then).
      - name: Normalize and regenerate index
        run: npm run normalize

      - name: Commit and push reconciled data
        run: |
          if git diff --quiet; then
            echo "Nothing to reconcile."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # [skip ci] stops this push from re-triggering the push trigger above.
          git commit -m "Reconcile xlrcdb data (normalize + index) [skip ci]"
          git push origin HEAD:main
